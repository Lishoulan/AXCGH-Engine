name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Python Engine Tests (no C++ compilation needed)
  # ──────────────────────────────────────────────
  test-python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install onnxruntime numpy Pillow pytest

      - name: Install package (Python only, skip C++ build)
        working-directory: DeepCGHEngine
        run: |
          pip install --no-build-isolation -e . || pip install -e .

      - name: Run import test
        run: |
          python -c "from deepcgh_engine import EngineAPI, EngineConfig; print('Import OK')"

  # ──────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install black

      - name: Check formatting
        run: black --check --diff DeepCGHEngine/deepcgh_engine/ || true
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Package Build
  # ──────────────────────────────────────────────
  package:
    name: Build Wheel
    runs-on: ubuntu-latest
    needs: [test-python]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel
        working-directory: DeepCGHEngine
        run: python -m build --skip-cmake-build || python -m build
        continue-on-error: true

      - name: Check wheel
        working-directory: DeepCGHEngine
        run: twine check dist/* || true
        continue-on-error: true
